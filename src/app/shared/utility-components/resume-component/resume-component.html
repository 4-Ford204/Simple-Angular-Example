<div class="flex border border-gray-300">
  <div class="w-2/5 border-r">
    @if (image) {
      <div class="flex aspect-square items-center justify-center">
        <app-image-component
          imageClass="h-full w-full rounded-full object-cover"
          [src]="image"
          class="size-40"
        />
      </div>
    }

    <div class="mx-5 mb-5 flex flex-col">
      <div>
        @if (name) {
          <h1 class="text-2xl font-bold wrap-break-word">{{ name }}</h1>
        }

        @if (position) {
          <span>{{ position }}</span>
        }
      </div>

      @if (description) {
        <div class="mt-5">
          <ng-container
            [ngTemplateOutlet]="section"
            [ngTemplateOutletContext]="{ name: 'About Me' }"
          ></ng-container>

          <div class="px-5">
            <div>{{ description }}</div>
          </div>
        </div>
      }

      @if (technologies) {
        <div class="mt-5">
          <ng-container
            [ngTemplateOutlet]="section"
            [ngTemplateOutletContext]="{ name: 'Technologies' }"
          ></ng-container>

          <div class="px-5">
            <ul class="grid grid-cols-[auto_auto_1fr] gap-y-1.5">
              @for (technology of technologies; track $index) {
                <li class="contents">
                  <span class="font-semibold">{{ technology.type }}</span>
                  <span class="mx-1.5">:</span>
                  <span class="min-w-0">{{ technology.name }}</span>
                </li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="m-5 grow">
    <ng-container
      [ngTemplateOutlet]="section"
      [ngTemplateOutletContext]="{ name: 'Experiences' }"
    ></ng-container>

    <div>
      <h3>ABC Company</h3>
      <p>Backend Developer</p>
    </div>
  </div>
</div>

<ng-template #section let-name="name">
  <div class="flex items-center gap-5">
    <div class="h-px flex-1 bg-gray-300"></div>

    <span class="leading-8 font-medium">{{ name }}</span>

    <div class="h-px flex-1 bg-gray-300"></div>
  </div>
</ng-template>
