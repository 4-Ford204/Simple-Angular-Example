<p-multiselect
  [invalid]="invalid"
  [disabled]="disabled"
  [filter]="filter"
  [maxSelectedLabels]="maxSelectedLabels"
  [optionLabel]="optionLabel"
  [loading]="loading"
  [display]="display"
  [showClear]="showClear"
  [placeholder]="placeholder"
  [options]="options"
  [size]="size"
  [variant]="variant"
  fluid
  [(ngModel)]="model"
  (onChange)="onValueChanged($event)"
></p-multiselect>
