<p-image class="h-full w-full" [preview]="preview">
  <ng-template #image>
    <img [src]="src" [alt]="alt" [attr.width]="width" [class]="imageClass" />
  </ng-template>

  @if (preview) {
    <ng-template #indicator>
      <i class="pi pi-search"></i>
    </ng-template>

    <ng-template #preview let-style="style" let-previewCallback="previewCallback">
      <img [src]="src" alt="alt" [style]="style" (click)="previewCallback()" onkeypress="" />
    </ng-template>
  }
</p-image>
