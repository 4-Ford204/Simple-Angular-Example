<p-image class="h-full w-full" [preview]="preview" [appendTo]="appendTo">
  <ng-template #image>
    <img
      [src]="src"
      [alt]="alt"
      [loading]="loading"
      [decoding]="decoding"
      [attr.width]="width"
      [attr.height]="height"
      [class]="imageClass"
    />
  </ng-template>

  @if (preview) {
    <ng-template #indicator>
      <i class="pi pi-search"></i>
    </ng-template>

    <ng-template #preview let-style="style" let-previewCallback="previewCallback">
      <img
        [src]="src"
        [alt]="alt"
        [loading]="loading"
        [decoding]="decoding"
        [style]="style"
        class="max-h-screen max-w-screen object-contain"
        (click)="previewCallback()"
        onkeypress=""
      />
    </ng-template>
  }
</p-image>
