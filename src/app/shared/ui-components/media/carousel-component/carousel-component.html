<p-carousel [numVisible]="numVisible" [numScroll]="numScroll" [value]="value" [circular]="circular">
  <ng-template let-product #item>
    <div class="flex w-full justify-center">
      <div class="mx-2 flex max-w-[250px] flex-col flex-wrap gap-1 rounded-md border p-2">
        <div class="flex max-w-full flex-col gap-1">
          <div
            class="flex h-[250px] items-center justify-center overflow-hidden border border-gray-200"
          >
            <app-image-component
              [src]="product.images[productImages[product.id]]"
              [alt]="product.name"
              class="rounded-md object-contain"
            />
          </div>

          <div class="relative h-17">
            <div class="flex gap-1 overflow-x-auto">
              @for (image of product.images; track $index) {
                <app-image-component
                  [src]="image"
                  [alt]="product.id"
                  (click)="onImageChanged(product.id, $index)"
                  class="flex h-15 w-15 shrink-0 cursor-pointer items-center justify-center overflow-hidden object-contain"
                  [class.border-2]="productImages[product.id] === $index"
                  onkeypress=""
                />
              }
            </div>
          </div>
        </div>

        <div class="flex shrink-0 flex-col">
          <div class="mt-1 mb-1 text-lg font-semibold">
            {{ product.name }}
          </div>

          <div class="mb-3 flex gap-3">
            <span class="text-sm font-medium text-gray-500">
              {{ product.studio }}
            </span>

            <span class="text-sm font-medium text-gray-500">
              {{ product.type }}
            </span>
          </div>

          <div class="flex items-center justify-between">
            <div class="font-bold">
              {{ product.price }}
            </div>

            <div>
              <app-button-component icon="pi pi-heart" severity="secondary" [outlined]="true" />
              <app-button-component icon="pi pi-shopping-cart" styleClass="ml-2" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-template>
</p-carousel>
