<ng-template #panelTemplate let-title="title" let-content="content" let-direction="direction">
  <div class="grid grid-cols-1 items-center gap-4 rounded-md p-5 shadow-md md:grid-cols-8">
    <span class="text-center font-bold">{{ title }}</span>

    <div
      class="flex w-full flex-wrap items-center justify-center gap-4 md:col-span-7"
      [ngClass]="{ 'flex-col': direction === 'column' }"
    >
      <ng-container [ngTemplateOutlet]="content"></ng-container>
    </div>
  </div>
</ng-template>
