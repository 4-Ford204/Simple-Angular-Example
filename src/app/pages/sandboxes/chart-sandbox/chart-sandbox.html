<app-sandbox #sandbox></app-sandbox>

<div class="flex flex-col gap-5">
  <ng-template #basic>
    <app-chart-component
      type="bar"
      [data]="barChartData"
      [options]="barChartOption"
      (dataChosen)="onDataChosen('Basic', $event)"
      class="h-80 w-4/5"
    />
  </ng-template>

  <ng-template #pie>
    <app-chart-component
      type="pie"
      [data]="pieChartData"
      [options]="pieChartOption"
      (dataChosen)="onDataChosen('Pie', $event)"
      class="h-80"
    />
  </ng-template>

  <ng-template #doughnut>
    <app-chart-component
      type="doughnut"
      [data]="doughnutChartData"
      [options]="doughnutChartOption"
      (dataChosen)="onDataChosen('Doughnut', $event)"
      class="h-80"
    />
  </ng-template>

  <ng-template #verticalBar>
    <app-chart-component
      type="bar"
      [data]="verticalBarChartData"
      [options]="verticalBarChartOption"
      (dataChosen)="onDataChosen('Vertical Bar', $event)"
      class="h-80 w-4/5"
    />
  </ng-template>

  <ng-template #horizontalBar>
    <app-chart-component
      type="bar"
      [data]="horizontalBarChartData"
      [options]="horizontalBarChartOption"
      (dataChosen)="onDataChosen('Horizontal Bar', $event)"
      class="h-80 w-4/5"
    />
  </ng-template>

  <ng-template #stackedBar>
    <app-chart-component
      type="bar"
      [data]="stackedBarChartData"
      [options]="stackedBarChartOption"
      (dataChosen)="onDataChosen('Stacked Bar', $event)"
      class="h-80 w-4/5"
    />
  </ng-template>

  @if (sandbox.panelTemplate) {
    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Basic', content: basic }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Pie', content: pie }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Doughnut', content: doughnut }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Vertical Bar', content: verticalBar }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Horizontal Bar', content: horizontalBar }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Stacked Bar', content: stackedBar }"
    ></ng-container>
  }
</div>
