<app-sandbox #sandbox></app-sandbox>

<div class="flex flex-col gap-5">
  <ng-template #basic>
    <app-chart-component
      type="bar"
      [data]="barChartData"
      [options]="barChartOption"
      class="flex h-80 justify-center"
    />
  </ng-template>

  <ng-template #pie>
    <app-chart-component type="pie" [data]="pieChartData" [options]="pieChartOption" class="h-80" />
  </ng-template>

  <ng-template #doughnut>
    <app-chart-component
      type="doughnut"
      [data]="doughnutChartData"
      [options]="doughnutChartOption"
      class="h-80"
    />
  </ng-template>

  <ng-template #verticalBar>
    <app-chart-component
      type="bar"
      [data]="verticalBarChartData"
      [options]="verticalBarChartOption"
      class="flex h-80 justify-center"
    />
  </ng-template>

  @if (sandbox.panelTemplate) {
    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Basic', content: basic }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Pie', content: pie }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Doughnut', content: doughnut }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Vertical Bar', content: verticalBar }"
    ></ng-container>
  }
</div>
