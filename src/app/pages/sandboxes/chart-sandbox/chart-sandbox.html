<app-sandbox #sandbox></app-sandbox>

<div class="flex flex-col gap-5">
  <ng-template #basic>
    <app-bar-chart-component [data]="barChartData" class="h-80 w-full" />
  </ng-template>

  <ng-template #pie>
    <app-pie-chart-component [data]="pieChartData" class="h-80" />
  </ng-template>

  <ng-template #doughnut>
    <app-doughnut-chart-component [data]="doughnutChartData" class="h-80" />
  </ng-template>

  @if (sandbox.panelTemplate) {
    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Basic', content: basic }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Pie', content: pie }"
    ></ng-container>

    <ng-container
      [ngTemplateOutlet]="sandbox.panelTemplate"
      [ngTemplateOutletContext]="{ title: 'Doughnut', content: doughnut }"
    ></ng-container>
  }
</div>
