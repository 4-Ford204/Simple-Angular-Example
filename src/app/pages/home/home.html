<div class="flex w-full flex-col gap-5">
  <div class="my-1 flex w-full flex-wrap items-center justify-center p-1">
    <div class="w-full md:w-3/5">
      <app-table-component
        [paginator]="true"
        [rowsPerPageOptions]="[5, 10]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} products"
        [value]="products"
        [columns]="columns"
        [first]="0"
        [rows]="10"
      />
    </div>

    <div class="w-full md:w-2/5">
      <app-carousel-component
        [numVisible]="1"
        [products]="carouselProducts"
        [circular]="true"
        [autoplayInterval]="10000"
      />
    </div>
  </div>

  <div class="my-1 flex items-center justify-center px-5">
    <app-chart-component
      type="line"
      [data]="chartData"
      [options]="chartOption"
      class="h-150 w-full"
    />
  </div>
</div>
