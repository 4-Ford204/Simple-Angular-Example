<div class="flex w-full flex-col gap-5">
  <div class="my-1 flex w-full flex-wrap items-center justify-center p-1 md:h-200">
    <div class="w-full md:h-full md:w-3/5">
      <app-table-component
        [paginator]="true"
        [rowsPerPageOptions]="[15, 20, 25]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} products"
        [globalFilterFields]="['name', 'series', 'studio']"
        [scrollable]="true"
        scrollHeight="flex"
        [value]="products"
        [columns]="columns"
        [first]="0"
        [rows]="15"
      />
    </div>

    <div class="w-full md:w-2/5">
      <div class="my-1 flex justify-center">
        <app-auto-complete-component
          [dropdown]="true"
          [suggestions]="suggestions"
          [(model)]="studio"
          (valueCompleted)="onStudioCompleted($event)"
          (valueChanged)="onStudioChanged($event)"
        />
      </div>

      <app-carousel-component [numVisible]="1" [products]="carouselProducts" [circular]="true" />
    </div>
  </div>

  <div class="my-1 flex items-center justify-center px-5">
    <app-chart-component
      type="bar"
      [data]="chartData"
      [options]="chartOption"
      class="h-150 w-full"
    />
  </div>
</div>

<ng-template #actionTemplate let-item>
  <div class="flex items-center justify-center">
    <app-button-component
      icon="pi pi-eye"
      severity="contrast"
      size="small"
      (buttonPressed)="onActionButtonPressed(item)"
    />
  </div>
</ng-template>
