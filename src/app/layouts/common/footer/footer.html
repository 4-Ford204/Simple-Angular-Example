<div>
  <div class="flex flex-col">
    <span class="">Accepted Payment Methods</span>

    <div class="flex flex-wrap items-center gap-1">
      @for (item of paymentMethods; track $index) {
        <app-image-component
          [src]="item.icon"
          [alt]="item.name"
          imageClass="h-8 w-12 object-contain"
        />
      }
    </div>
  </div>
</div>
