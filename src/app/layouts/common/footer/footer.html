<div>
  <div class="mx-auto flex max-w-6xl flex-col items-center gap-3">
    <span class="text-sm opacity-70"> Accepted Payment Methods </span>

    <div class="flex flex-wrap justify-center gap-3">
      @for (item of paymentMethods; track $index) {
        <div
          class="flex h-8 w-12 items-center justify-center rounded-md bg-[var(--p-surface-100)] p-1 transition-all duration-200 hover:-translate-y-1 hover:shadow-md dark:bg-[var(--p-surface-800)]"
          [title]="item.name"
        >
          <img [src]="item.icon" [alt]="item.name" class="h-full w-full object-contain" />
        </div>
      }
    </div>
  </div>
</div>
